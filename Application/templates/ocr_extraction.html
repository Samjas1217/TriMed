<!DOCTYPE html>
<html>
<head>
<title>OCR Extraction</title>

<style>
body{
font-family:Segoe UI;
background:#f4f6f9;
padding:40px;
}

.container{
display:flex;
gap:40px;
}

img{
width:400px;
border-radius:10px;
}

textarea{
width:500px;
height:300px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
margin-top:10px;
background:#0a66c2;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

</style>
</head>

<body>

<h2>Fax OCR Extraction</h2>

<div class="container">

<div>
<h3>Fax Image</h3>
<img src="/output_images/{{ image_filename }}">
</div>

<div>

<h3>Extracted Text</h3>

<textarea id="ocrText" readonly></textarea>

<div id="status" style="margin-top:10px;font-weight:bold;"></div>

<br>

<button onclick="linkPatient()">Link to Patient</button>

<button onclick="viewTimeline()">View Patient Timeline</button>

</div>

</div>

<script>

let patientId = null;

window.onload = function(){

fetch("/extract_text",{
method:"POST",
credentials:"include"
})
.then(res=>res.json())
.then(data=>{

if(data.status === "success"){

document.getElementById("ocrText").value = data.extracted_text;

document.getElementById("status").innerHTML =
"Patient Status: " + data.patient_status +
" | Confidence: " + data.match_confidence + "%";

patientId = data.patient_id;

}else{

document.getElementById("ocrText").value = "OCR failed.";

}

})
.catch(err=>{
console.log(err);
document.getElementById("ocrText").value = "Error extracting text.";
})

}

function linkPatient(){

alert("Document linked to patient successfully.");

}

function viewTimeline(){

if(patientId){
window.location.href = "/patient_timeline/" + patientId;
}else{
alert("Patient ID not found.");
}

}

</script>

</body>
</html>
