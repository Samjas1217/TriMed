<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TriMed's Patient Linking - Fax Upload</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
}


header {
    background: linear-gradient(135deg, #2c5364, #203a43);
    color: white;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
header h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 1px;
}
header nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: 500;
    transition: color 0.3s ease;
}
header nav a:hover {
    color: #74ebd5;
}


.main {
    flex: 1;
    display: flex;
    padding: 40px;
    gap: 30px;
}
.left-panel {
    flex: 0.8; 
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    padding: 30px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}
.right-panel {
    flex: 1.2;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    padding: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Upload form */
.left-panel h2 {
    color: #2c5364;
    margin-bottom: 20px;
    font-weight: 600;
}
input[type="file"] {
    margin: 20px 0;
    padding: 12px;
    border: 2px dashed #2c5364;
    border-radius: 10px;
    width: 85%;
    cursor: pointer;
    transition: 0.3s;
}
input[type="file"]:hover {
    background: #f0f8ff;
}
button {
    padding: 12px 25px;
    border: none;
    background: linear-gradient(135deg, #2c5364, #203a43);
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.3s ease;
}
button:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #203a43, #0f2027);
}
#status {
    margin-top: 15px;
    font-weight: bold;
    color: #2c5364;
}


.progress-container {
    width: 100%;
    background: #eee;
    border-radius: 10px;
    margin-top: 15px;
    display: none;
}
.progress-bar {
    height: 12px;
    width: 0%;
    background: linear-gradient(135deg, #74ebd5, #3498db);
    border-radius: 10px;
    transition: width 0.3s ease;
}


.preview {
    display: none;
    text-align: center;
    width: 100%;
}
.preview img {
    max-width: 100%;
    max-height: 500px;
    object-fit: contain;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
}
.preview img:hover {
    transform: scale(1.02);
}

/* Rotating logo placeholder */
.logo-placeholder {
    opacity: 0.4;
    animation: blink 2s infinite;
}
.logo-placeholder img {
    max-width: 200px;
}
@keyframes blink {
    0% { opacity: 0.2; }
    50% { opacity: 1; }
    100% { opacity: 0.2; }
}



#proceedBtn {
    margin-top: 20px;
    padding: 14px 28px;
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    color: white;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s ease, background 0.3s ease;
    display: none;
}
#proceedBtn:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #219150, #27ae60);
}
</style>
</head>

<body>
<header>
    <h1>TriMed's Patient Linking</h1>
    <nav>
        <a href="/">Dashboard</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
</header>

<div class="main">
   
    <div class="left-panel">
        <div>
            <h2>📄 Upload Fax PDF</h2>
            <form id="uploadForm" enctype="multipart/form-data">
                <input type="file" id="pdfFile" name="fax" accept=".pdf" required>
                <br>
                <button type="submit">Upload & Extract</button>
            </form>
            <div id="status"></div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
        <button id="proceedBtn" onclick="goToTextPage()">Proceed ➜</button>
    </div>

    
    <div class="right-panel">
        <div class="logo-placeholder" id="logoPlaceholder">
            <img src="https://media.istockphoto.com/id/471629610/vector/caduceus-medical-symbol.jpg?s=612x612&w=0&k=20&c=jLnfdQQphRwsmm6wo0O80sEo-5PhbEY4PHmQgBiRkq0=" alt="Medical Logo">
        </div>
        <div class="preview" id="preview">
            <img id="faxImage" src="" alt="Fax Preview">
        </div>
    </div>
</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const fileInput = document.getElementById("pdfFile");
    const statusDiv = document.getElementById("status");
    const previewDiv = document.getElementById("preview");
    const faxImage = document.getElementById("faxImage");
    const progressContainer = document.getElementById("progressContainer");
    const progressBar = document.getElementById("progressBar");
    const logoPlaceholder = document.getElementById("logoPlaceholder");

    if (fileInput.files.length === 0) {
        statusDiv.innerHTML = "⚠️ Please select a PDF.";
        return;
    }

    const formData = new FormData();
    formData.append("fax", fileInput.files[0]);

    statusDiv.innerHTML = "⏳ Uploading & Processing...";
    progressContainer.style.display = "block";
    progressBar.style.width = "0%";

    try {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/upload", true);

        xhr.upload.onprogress = function(event) {
            if (event.lengthComputable) {
                const percentComplete = (event.loaded / event.total) * 100;
                progressBar.style.width = percentComplete + "%";
            }
        };

        xhr.onload = function() {
            if (xhr.status === 200) {
                const result = JSON.parse(xhr.responseText);
                if (result.success) {
                    statusDiv.innerHTML = "✅ First page extracted!";
                    progressBar.style.width = "100%";
                    faxImage.src = "/output_images/" + result.image_filename;
                    previewDiv.style.display = "block";
                    logoPlaceholder.style.display = "none";
                    document.getElementById("proceedBtn").style.display = "block";
                } else {
                    statusDiv.innerHTML = "❌ Error: " + result.error;
                    previewDiv.style.display = "none";
                    logoPlaceholder.style.display = "block";
                    document.getElementById("proceedBtn").style.display = "none";
                }
            } else {
                statusDiv.innerHTML = "❌ Upload failed.";
                previewDiv.style.display = "none";
                logoPlaceholder.style.display = "block";
                document.getElementById("proceedBtn").style.display = "none";
            }
        };

        xhr.onerror = function() {
            statusDiv.innerHTML = "❌ Fetch failed — see console.";
            previewDiv.style.display = "none";
            document.getElementById("proceedBtn").style.display = "none";
        };

        xhr.send(formData);

    } catch (err) {
        console.error(err);
        statusDiv.innerHTML = "❌ Fetch failed — see console.";
        previewDiv.style.display = "none";
        document.getElementById("proceedBtn").style.display = "none";
    }
});

function goToTextPage() {
    window.location.href = "/text_extraction";
}

window.addEventListener("pageshow", function (event) {
    if (event.persisted) {
        window.location.reload();
    }
});

function logout() {
    fetch("/logout", {
        method: "POST",
        credentials: "include"
    })
    .then(() => {
        window.location.replace("/login");
    });
}
</script>
</body>
</html>
